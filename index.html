<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Heart Landing</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        overflow:hidden;
        background:black;
        font-family:Arial, sans-serif;
    }

    canvas{
        position:fixed;
        inset:0;
        z-index:0;
    }

    .btn-container{
        position:fixed;
        inset:0;
        display:flex;
        justify-content:center;
        align-items:center;
        z-index:100;
        transition:0.5s;
    }

    .love-button{
        background:linear-gradient(135deg,#ff1a1a,#b30000);
        border:none;
        color:white;
        font-size:2rem;
        font-weight:bold;
        padding:1rem 2.5rem;
        border-radius:60px;
        cursor:pointer;
        box-shadow:
            0 0 25px rgba(255,0,0,.6),
            0 0 60px rgba(255,0,0,.4);
        transition:.2s;
    }

    .love-button:hover{
        transform:scale(1.05);
    }

    .love-button.hide{
        opacity:0;
        transform:scale(.7);
        pointer-events:none;
    }

        color:#ff2a2a;

        z-index:10;
        transform:translate(-50%,-50%);
        will-change:transform,left,top;
    }

    .bright{

        font-weight:bold;

    @media(max-width:700px){
        .love-button{
            font-size:1.3rem;
            padding:.8rem 1.8rem;
        }
    }
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="btn-container" id="btnContainer">
    <button class="love-button" id="magicBtn">
        ❤️ СОТВОРИ ЛЮБОВЬ ❤️
    </button>
</div>

<script>
/* =========================================================
   ЗВЁЗДЫ — ОСТАВЛЕНЫ
========================================================= */

const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resizeCanvas();

const stars = [];

for(let i=0;i<1800;i++){
    stars.push({
        x:(Math.random()-0.5)*canvas.width*2,
        y:(Math.random()-0.5)*canvas.height*2,
        z:Math.random()*canvas.width,
        size:Math.random()*2
    });
}

function animateStars(){

    ctx.fillStyle = "black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    for(const star of stars){

        star.z -= 2;

        if(star.z <= 0){
            star.z = canvas.width;
        }

        const k = 128/star.z;

        const x =
            star.x*k + canvas.width/2;

        const y =
            star.y*k + canvas.height/2;

        const size =
            (1 - star.z/canvas.width)*2;

        if(
            x >= 0 &&
            x <= canvas.width &&
            y >= 0 &&
            y <= canvas.height
        ){
            ctx.beginPath();

            ctx.fillStyle =
                `rgba(255,255,255,${
                    Math.random()
                })`;

            ctx.arc(x,y,size,0,Math.PI*2);

            ctx.fill();
        }
    }

    requestAnimationFrame(animateStars);
}

animateStars();

/* =========================================================
   ГЕНЕРАЦИЯ БОЛЬШОГО СЕРДЦА
========================================================= */

const words = [];
const miniHearts = [];

function heartPoint(t, scale){

    const x =
        16 * Math.pow(Math.sin(t),3);

    const y =
        13 * Math.cos(t)
        - 5 * Math.cos(2*t)
        - 2 * Math.cos(3*t)
        - Math.cos(4*t);

    return {
        x:x*scale,
        y:-y*scale
    };
}

/* =========================================================
   СОЗДАНИЕ СЛОВ
========================================================= */

function createHeart(){

    const total = 700;

    const scale =
        Math.min(innerWidth,innerHeight)*0.028;

    for(let i=0;i<total;i++){

        const t =
            Math.random()*Math.PI*2;

        const pos =
            heartPoint(t,scale);

        const word =
            document.createElement('div');

        word.className = 'word';

        word.innerText = 'i love you';

        word.style.fontSize =
            (12 + Math.random()*16)+'px';

        // ярче по краям сердца
        if(Math.random() > 0.55){
            word.classList.add('bright');
        }

        document.body.appendChild(word);

        const tx =
            innerWidth/2 + pos.x;

        const ty =
            innerHeight/2 + pos.y;

        // ХАОТИЧНЫЙ ВЫЛЕТ
        const side =
            Math.floor(Math.random()*4);

        let sx, sy;

        if(side===0){
            sx = -300 - Math.random()*600;
            sy = Math.random()*innerHeight;
        }

        if(side===1){
            sx = innerWidth + 300 + Math.random()*600;
            sy = Math.random()*innerHeight;
        }

        if(side===2){
            sx = Math.random()*innerWidth;
            sy = -300 - Math.random()*600;
        }

        if(side===3){
            sx = Math.random()*innerWidth;
            sy = innerHeight + 300 + Math.random()*600;
        }

        animateWord(
            word,
            sx,
            sy,
            tx,
            ty,
            i
        );

        words.push(word);
    }

    
}

/* =========================================================
   АНИМАЦИЯ
========================================================= */

function animateWord(
    el,
    sx,
    sy,
    tx,
    ty,
    index
){

    const duration =
        2500 + Math.random()*2500;

    const delay =
        Math.random()*2500;

    const rotate =
        -360 + Math.random()*720;

    const start =
        performance.now() + delay;

    function frame(time){

        const progress =
            Math.min(
                (time-start)/duration,
                1
            );

        if(progress < 0){
            requestAnimationFrame(frame);
            return;
        }

        const ease =
            1 - Math.pow(1-progress,3);

        const x =
            sx + (tx-sx)*ease;

        const y =
            sy + (ty-sy)*ease;

        const floatX =
            Math.sin(progress*20+index)*18;

        el.style.left =
            (x+floatX)+'px';

        el.style.top =
            y+'px';

        el.style.opacity =
            Math.min(progress*1.5,1);

        el.style.transform =
            `translate(-50%,-50%)
            rotate(${rotate*(1-progress)}deg)
            scale(${0.6 + ease*0.5})`;

        if(progress < 1){

            requestAnimationFrame(frame);

        }else{

            idleAnimation(
                el,
                tx,
                ty,
                index
            );
        }
    }

    requestAnimationFrame(frame);
}

/* =========================================================
   ЖИВОЕ ДВИЖЕНИЕ
========================================================= */

function idleAnimation(
    el,
    baseX,
    baseY,
    i
){

    function move(){

        const t =
            Date.now()*0.001;

        const x =
            Math.sin(t+i)*4;

        const y =
            Math.cos(t*1.2+i)*4;

        el.style.left =
            baseX + x + 'px';

        el.style.top =
            baseY + y + 'px';

        requestAnimationFrame(move);
    }

    move();
}

/* =========================================================
   КНОПКА
========================================================= */

document
.getElementById('magicBtn')
.addEventListener('click',()=>{

    document
    .getElementById('magicBtn')
    .classList.add('hide');

    setTimeout(()=>{
        document
        .getElementById('btnContainer')
        .style.display='none';
    },500);

    createHeart();
});

/* =========================================================
   RESIZE
========================================================= */

window.addEventListener(
    'resize',
    resizeCanvas
);
</script>

</body>
</html>
